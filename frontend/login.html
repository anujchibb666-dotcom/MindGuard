<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – MindGuard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>

<body>
    <canvas id="particles-canvas"></canvas>
    <div class="auth-page">
        <div class="auth-card glass-card-static">
            <div class="auth-logo">
                <span>🧠</span>
                <span class="text-gradient">MindGuard</span>
            </div>
            <h1>Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue your wellness journey</p>

            <form id="login-form" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@university.edu" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
                    <label
                        style="display:flex;align-items:center;gap:8px;color:var(--text-secondary);font-size:0.85rem;cursor:pointer;">
                        <input type="checkbox" id="remember" style="accent-color:var(--primary);">
                        Remember me
                    </label>
                    <a href="forgot-password.html" style="font-size:0.85rem;">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary w-full btn-lg" id="login-btn">
                    Sign In
                </button>
            </form>

            <div class="auth-divider">or continue with</div>

            <button class="btn btn-google" id="google-login-btn" onclick="handleGoogleLogin()" style="gap:10px;">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <path
                        d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z"
                        fill="#4285F4" />
                    <path
                        d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z"
                        fill="#34A853" />
                    <path
                        d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z"
                        fill="#FBBC05" />
                    <path
                        d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z"
                        fill="#EA4335" />
                </svg>
                Google
            </button>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign up free</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/api.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div> Signing in...';
            btn.disabled = true;

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showToast('Please fill in all fields', 'error');
                btn.innerHTML = 'Sign In';
                btn.disabled = false;
                return;
            }

            try {
                const result = await Auth.login(email, password);
                if (result.success) {
                    showToast('Welcome back! Redirecting...', 'success');
                    // Redirect admin/counselor to admin dashboard
                    const user = result.user || Auth.getUser();
                    const dest = (user && (user.role === 'admin' || user.role === 'counselor'))
                        ? 'admin.html' : 'dashboard.html';
                    setTimeout(() => window.location.href = dest, 1000);
                    return; // Don't re-enable button, we're redirecting
                } else {
                    showToast(result.error || 'Invalid credentials', 'error');
                }
            } catch (err) {
                showToast('Login failed. Please try again.', 'error');
            }

            btn.innerHTML = 'Sign In';
            btn.disabled = false;
        }

        function handleGoogleLogin() {
            // Use Google Identity Services
            if (typeof google !== 'undefined' && google.accounts) {
                google.accounts.id.initialize({
                    client_id: '862920498498-vc0hn2lkq0hk7n7jtnh4m6hb03dskq49.apps.googleusercontent.com',
                    callback: handleGoogleCredential,
                    auto_select: false
                });
                google.accounts.id.prompt();
            } else {
                // Fallback: demo Google login
                demoGoogleLogin();
            }
        }

        function handleGoogleCredential(response) {
            // Decode JWT token from Google
            try {
                const payload = JSON.parse(atob(response.credential.split('.')[1]));
                const userData = {
                    name: payload.name || payload.email.split('@')[0],
                    email: payload.email,
                    password: 'google_oauth_' + payload.sub,
                    role: 'student'
                };

                // Try signup first, then login if exists
                Auth.signup(userData).then(result => {
                    if (result.success) {
                        showToast('Welcome! Redirecting...', 'success');
                        setTimeout(() => window.location.href = 'dashboard.html', 1000);
                    } else {
                        // Already registered, try login
                        Auth.login(userData.email, userData.password).then(loginResult => {
                            if (loginResult.success) {
                                showToast('Welcome back! Redirecting...', 'success');
                                setTimeout(() => window.location.href = 'dashboard.html', 1000);
                            } else {
                                demoGoogleLogin(payload);
                            }
                        });
                    }
                });
            } catch (e) {
                demoGoogleLogin();
            }
        }

        function demoGoogleLogin(payload = null) {
            const name = payload?.name || 'Google User';
            const email = payload?.email || 'google@demo.edu';
            const result = Auth.demoSignup({ name, email, password: 'google_demo', role: 'student' });
            if (result.success) {
                showToast('Signed in with Google! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(60px)'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
</body>

</html>
