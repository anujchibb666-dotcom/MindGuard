<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – MindGuard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>

<body>
    <canvas id="particles-canvas"></canvas>
    <div class="auth-page">
        <div class="auth-card glass-card-static">
            <div class="auth-logo">
                <span>🧠</span>
                <span class="text-gradient">MindGuard</span>
            </div>
            <h1>Reset Password</h1>
            <p class="auth-subtitle">Enter your new password below</p>

            <form id="reset-form" onsubmit="return handleReset(event)">
                <div class="form-group">
                    <label class="form-label" for="password">New Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-input" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary w-full btn-lg" id="reset-btn">
                    Update Password
                </button>
            </form>

            <div class="auth-footer">
                <a href="login.html">Back to login</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="js/api.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showToast('Invalid reset link. Please request a new one.', 'error');
            document.getElementById('reset-form').style.display = 'none';
        }

        async function handleReset(e) {
            e.preventDefault();
            const btn = document.getElementById('reset-btn');
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (password !== confirm) {
                showToast('Passwords do not match', 'error');
                return;
            }

            btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div> Updating...';
            btn.disabled = true;

            try {
                const result = await Auth.resetPassword(token, password);
                if (result.success) {
                    showToast('Password reset successful! Redirecting to login...', 'success');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showToast(result.error || 'Failed to reset password', 'error');
                }
            } catch (err) {
                showToast('An error occurred', 'error');
            }

            btn.innerHTML = 'Update Password';
            btn.disabled = false;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(60px)'; setTimeout(() => toast.remove(), 300); }, 5000);
        }
    </script>
</body>

</html>
