<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – MindGuard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>

<body>
    <canvas id="particles-canvas"></canvas>
    <div class="auth-page">
        <div class="auth-card glass-card-static">
            <div class="auth-logo">
                <span>🧠</span>
                <span class="text-gradient">MindGuard</span>
            </div>
            <h1>Forgot Password</h1>
            <p class="auth-subtitle">Enter your email and we'll send you a link to reset your password</p>

            <form id="forgot-form" onsubmit="return handleForgot(event)">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@university.edu" required>
                </div>
                <button type="submit" class="btn btn-primary w-full btn-lg" id="forgot-btn">
                    Send Reset Link
                </button>
            </form>

            <div class="auth-footer">
                Remember your password? <a href="login.html">Back to login</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="js/api.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function handleForgot(e) {
            e.preventDefault();
            const btn = document.getElementById('forgot-btn');
            const email = document.getElementById('email').value.trim();

            btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div> Sending...';
            btn.disabled = true;

            try {
                const result = await Auth.forgotPassword(email);
                if (result.success) {
                    showToast(result.message, 'success');
                    if (result.reset_link) {
                        setTimeout(() => {
                            showToast(`Reset Link: <a href="${result.reset_link}" style="color: #6366f1; text-decoration: underline;">Click Here</a>`, 'info');
                        }, 1000);
                    }
                } else {
                    showToast(result.error || 'Failed to send reset link', 'error');
                }
            } catch (err) {
                showToast('An error occurred', 'error');
            }

            btn.innerHTML = 'Send Reset Link';
            btn.disabled = false;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(60px)'; setTimeout(() => toast.remove(), 300); }, 5000);
        }
    </script>
</body>

</html>
