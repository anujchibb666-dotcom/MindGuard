<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – MindGuard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>

<body>
    <canvas id="particles-canvas"></canvas>
    <div class="auth-page">
        <div class="auth-card glass-card-static">
            <div class="auth-logo">
                <span>🧠</span>
                <span class="text-gradient">MindGuard</span>
            </div>
            <h1>Create Account</h1>
            <p class="auth-subtitle">Start your proactive mental wellness journey</p>

            <form id="signup-form" onsubmit="return handleSignup(event)">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">University Email</label>
                    <input type="email" id="email" class="form-input" placeholder="john@university.edu" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required
                        minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-input" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="role">I am a</label>
                    <select id="role" class="form-input" required>
                        <option value="student">Student</option>
                        <option value="counselor">Counselor</option>
                    </select>
                </div>
                <div style="margin-bottom:24px;">
                    <label
                        style="display:flex;align-items:flex-start;gap:8px;color:var(--text-secondary);font-size:0.85rem;cursor:pointer;">
                        <input type="checkbox" id="agree" required style="accent-color:var(--primary);margin-top:3px;">
                        <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary w-full btn-lg" id="signup-btn">
                    Create Account
                </button>
            </form>

            <div class="auth-divider">or sign up with</div>

            <button class="btn btn-google" id="google-signup-btn" onclick="handleGoogleSignup()" style="gap:10px;">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <path
                        d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z"
                        fill="#4285F4" />
                    <path
                        d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z"
                        fill="#34A853" />
                    <path
                        d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z"
                        fill="#FBBC05" />
                    <path
                        d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z"
                        fill="#EA4335" />
                </svg>
                Google
            </button>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/api.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function handleSignup(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                showToast('Passwords do not match!', 'error');
                return false;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return false;
            }

            const btn = document.getElementById('signup-btn');
            btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div> Creating account...';
            btn.disabled = true;

            const data = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: password,
                role: document.getElementById('role').value
            };

            if (!data.name || !data.email) {
                showToast('Please fill in all fields', 'error');
                btn.innerHTML = 'Create Account';
                btn.disabled = false;
                return false;
            }

            try {
                const result = await Auth.signup(data);
                if (result.success) {
                    showToast('Account created! Redirecting...', 'success');
                    // Redirect admin/counselor to admin dashboard
                    const user = result.user || Auth.getUser();
                    const dest = (user && (user.role === 'admin' || user.role === 'counselor'))
                        ? 'admin.html' : 'dashboard.html';
                    setTimeout(() => window.location.href = dest, 1000);
                    return; // Don't re-enable button, we're redirecting
                } else {
                    showToast(result.error || 'Signup failed', 'error');
                }
            } catch (err) {
                showToast('Signup failed. Please try again.', 'error');
            }

            btn.innerHTML = 'Create Account';
            btn.disabled = false;
        }

        function handleGoogleSignup() {
            if (typeof google !== 'undefined' && google.accounts) {
                google.accounts.id.initialize({
                    client_id: '862920498498-vc0hn2lkq0hk7n7jtnh4m6hb03dskq49.apps.googleusercontent.com',
                    callback: handleGoogleCredential,
                    auto_select: false
                });
                google.accounts.id.prompt();
            } else {
                demoGoogleSignup();
            }
        }

        function handleGoogleCredential(response) {
            try {
                const payload = JSON.parse(atob(response.credential.split('.')[1]));
                const userData = {
                    name: payload.name || payload.email.split('@')[0],
                    email: payload.email,
                    password: 'google_oauth_' + payload.sub,
                    role: 'student'
                };
                Auth.signup(userData).then(result => {
                    if (result.success) {
                        showToast('Account created! Redirecting...', 'success');
                        setTimeout(() => window.location.href = 'dashboard.html', 1000);
                    } else {
                        Auth.login(userData.email, userData.password).then(r => {
                            if (r.success) {
                                showToast('Welcome back! Redirecting...', 'success');
                                setTimeout(() => window.location.href = 'dashboard.html', 1000);
                            } else { demoGoogleSignup(payload); }
                        });
                    }
                });
            } catch (e) { demoGoogleSignup(); }
        }

        function demoGoogleSignup(payload = null) {
            const name = payload?.name || 'Google User';
            const email = payload?.email || 'google@demo.edu';
            const result = Auth.demoSignup({ name, email, password: 'google_demo', role: 'student' });
            if (result.success) {
                showToast('Signed up with Google! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(60px)'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
</body>

</html>
